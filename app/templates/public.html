<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>London Tasteful Events</title>
    <style>
      :root {
        --bg: #f5f6f6;
        --ink: #132126;
        --muted: #607074;
        --line: #d7dede;
        --card: #ffffff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "IBM Plex Sans", "Avenir Next", "Segoe UI", sans-serif;
        color: var(--ink);
        background: var(--bg);
      }

      main {
        max-width: 900px;
        margin: 0 auto;
        padding: 16px 12px 28px;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 24px;
        line-height: 1.2;
      }

      .controls {
        display: grid;
        grid-template-columns: 1fr 1fr auto;
        gap: 8px;
        margin-bottom: 10px;
        position: sticky;
        top: 0;
        z-index: 4;
        background: var(--bg);
        padding: 8px 0;
      }

      select,
      button {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--card);
        color: var(--ink);
        font-size: 14px;
        padding: 9px 10px;
      }

      button {
        cursor: pointer;
      }

      .list {
        margin: 0;
        padding: 0;
        list-style: none;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: var(--card);
      }

      .list li {
        border-top: 1px solid var(--line);
        padding: 9px 12px;
      }

      .list li:first-child {
        border-top: none;
      }

      .org-name {
        display: block;
        font-size: 14px;
        line-height: 1.25;
        margin: 0;
      }

      .org-name a {
        color: #0645ad;
        text-decoration: underline;
      }

      .org-name a:visited {
        color: #551a8b;
      }

      .org-name a:hover {
        color: #0b2e87;
      }

      .org-meta {
        margin-top: 2px;
        font-size: 12px;
        color: var(--muted);
      }

      .empty {
        border: 1px dashed #bcc7c7;
        border-radius: 10px;
        color: var(--muted);
        background: var(--card);
        padding: 18px 12px;
        text-align: center;
      }

      @media (max-width: 700px) {
        .controls {
          grid-template-columns: 1fr 1fr;
        }

        button {
          grid-column: span 2;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>London Tasteful Events</h1>

      <section class="controls">
        <select id="category-filter"></select>
        <select id="borough-filter"></select>
        <button id="clear-filters" type="button">Clear</button>
      </section>

      <section id="results"></section>
    </main>

    <script>
      window.PUBLIC_PAYLOAD = {{ payload | tojson }};
    </script>
    <script>
      const payload = window.PUBLIC_PAYLOAD || {};
      const allOrgs = Array.isArray(payload.orgs) ? payload.orgs : [];

      const ui = {
        category: "all",
        borough: "all",
      };

      const els = {
        category: document.getElementById("category-filter"),
        borough: document.getElementById("borough-filter"),
        clear: document.getElementById("clear-filters"),
        results: document.getElementById("results"),
      };

      function clean(value, fallback = "") {
        const text = String(value ?? "").trim();
        return text || fallback;
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function titleCase(value) {
        return clean(value)
          .split(" ")
          .filter(Boolean)
          .map((part) => part[0].toUpperCase() + part.slice(1))
          .join(" ");
      }

      function uniqueValues(items, key, fallback) {
        const values = new Set();
        for (const item of items) {
          values.add(clean(item[key], fallback));
        }
        return Array.from(values).sort((a, b) => a.localeCompare(b));
      }

      function writeFilterOptions() {
        const categories = uniqueValues(allOrgs, "category", "other");
        const boroughs = uniqueValues(allOrgs, "borough", "Unspecified");

        els.category.innerHTML = `<option value="all">All categories</option>${categories
          .map((item) => `<option value="${escapeHtml(item)}">${escapeHtml(titleCase(item))}</option>`)
          .join("")}`;

        els.borough.innerHTML = `<option value="all">All boroughs</option>${boroughs
          .map((item) => `<option value="${escapeHtml(item)}">${escapeHtml(item)}</option>`)
          .join("")}`;
      }

      function filteredOrgs() {
        const list = allOrgs.filter((org) => {
          const category = clean(org.category, "other");
          const borough = clean(org.borough, "Unspecified");
          if (ui.category !== "all" && ui.category !== category) return false;
          if (ui.borough !== "all" && ui.borough !== borough) return false;
          return true;
        });

        list.sort((a, b) => clean(a.name).localeCompare(clean(b.name)));
        return list;
      }

      function render() {
        const rows = filteredOrgs();
        if (!rows.length) {
          els.results.innerHTML = `<div class="empty">No organizations match the filters.</div>`;
          return;
        }

        const items = rows
          .map((org) => {
            const name = clean(org.name, "Unnamed");
            const eventsUrl = clean(org.events_url);
            const category = titleCase(clean(org.category, "other"));
            const borough = clean(org.borough, "Unspecified");
            const nameMarkup = eventsUrl
              ? `<a href="${escapeHtml(eventsUrl)}" target="_blank" rel="noreferrer noopener">${escapeHtml(name)}</a>`
              : escapeHtml(name);
            return `
              <li>
                <p class="org-name">${nameMarkup}</p>
                <div class="org-meta">${escapeHtml(category)} • ${escapeHtml(borough)}</div>
              </li>
            `;
          })
          .join("");

        els.results.innerHTML = `<ul class="list">${items}</ul>`;
      }

      function wireEvents() {
        els.category.addEventListener("change", (event) => {
          ui.category = event.target.value || "all";
          render();
        });

        els.borough.addEventListener("change", (event) => {
          ui.borough = event.target.value || "all";
          render();
        });

        els.clear.addEventListener("click", () => {
          ui.category = "all";
          ui.borough = "all";
          els.category.value = "all";
          els.borough.value = "all";
          render();
        });
      }

      writeFilterOptions();
      wireEvents();
      render();
    </script>
  </body>
</html>
