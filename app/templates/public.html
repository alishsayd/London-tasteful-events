<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>London Tasteful Events</title>
    <style>
      :root {
        --bg: #f5f6f6;
        --ink: #132126;
        --muted: #607074;
        --line: #d7dede;
        --card: #ffffff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "IBM Plex Sans", "Avenir Next", "Segoe UI", sans-serif;
        color: var(--ink);
        background: var(--bg);
        overflow-x: hidden;
      }

      main {
        max-width: 900px;
        margin: 0 auto;
        padding: 16px 12px 28px;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 24px;
        line-height: 1.2;
      }

      .controls {
        display: grid;
        grid-template-columns: 1fr 1fr auto;
        gap: 8px;
        margin-bottom: 10px;
        position: sticky;
        top: 0;
        z-index: 4;
        background: var(--bg);
        padding: 8px 0;
      }

      select,
      button {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--card);
        color: var(--ink);
        font-size: 14px;
        padding: 9px 10px;
        min-width: 0;
        max-width: 100%;
      }

      select {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      button {
        cursor: pointer;
      }

      .list {
        margin: 0;
        padding: 0;
        list-style: none;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: var(--card);
        min-width: 0;
      }

      .list li {
        border-top: 1px solid var(--line);
        padding: 9px 12px;
      }

      .list li:first-child {
        border-top: none;
      }

      .org-name {
        display: block;
        font-size: 14px;
        line-height: 1.25;
        margin: 0;
        overflow-wrap: break-word;
        word-break: break-word;
      }

      .org-name a {
        color: #0645ad;
        text-decoration: underline;
      }

      .org-name a:visited {
        color: #551a8b;
      }

      .org-name a:hover {
        color: #0b2e87;
      }

      .org-meta {
        margin-top: 2px;
        font-size: 12px;
        color: var(--muted);
        overflow-wrap: break-word;
        word-break: break-word;
      }

      .empty {
        border: 1px dashed #bcc7c7;
        border-radius: 10px;
        color: var(--muted);
        background: var(--card);
        padding: 18px 12px;
        text-align: center;
      }

      @media (max-width: 700px) {
        .controls {
          grid-template-columns: 1fr 1fr;
        }

        button {
          grid-column: span 2;
        }
      }

      @media (max-width: 400px) {
        .controls {
          grid-template-columns: 1fr;
        }

        button {
          grid-column: span 1;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>London Tasteful Events</h1>

      <section class="controls">
        <select id="type-filter"></select>
        <select id="borough-filter"></select>
        <button id="clear-filters" type="button">Clear</button>
      </section>

      <section id="results"></section>
    </main>

    <script>
      window.PUBLIC_PAYLOAD = {{ payload | tojson }};
    </script>
    <script>
      const payload = window.PUBLIC_PAYLOAD || {};
      const allOrgs = Array.isArray(payload.orgs) ? payload.orgs : [];

      const ui = {
        org_type: "all",
        borough: "all",
      };

      const els = {
        org_type: document.getElementById("type-filter"),
        borough: document.getElementById("borough-filter"),
        clear: document.getElementById("clear-filters"),
        results: document.getElementById("results"),
      };

      function clean(value, fallback = "") {
        const text = String(value ?? "").trim();
        return text || fallback;
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function titleCase(value) {
        return clean(value)
          .split(" ")
          .filter(Boolean)
          .map((part) => part[0].toUpperCase() + part.slice(1))
          .join(" ");
      }

      function orgTypeLabel(value) {
        const labels = {
          bookshop: "Bookshop",
          cinema: "Cinema",
          gallery: "Gallery",
          live_music_venue: "Live music venue",
          theatre: "Theatre",
          museum: "Museum",
          makers_space: "Makers space",
          park: "Park",
          garden: "Garden",
          cultural_centre: "Cultural centre",
          university: "University",
          learned_society: "Learned society",
          promoter: "Promoter",
          festival: "Festival",
          organisation: "Organisation",
        };
        const cleanValue = clean(value, "organisation");
        return labels[cleanValue] || titleCase(cleanValue.replace(/_/g, " "));
      }

      function uniqueValues(items, key, fallback) {
        const values = new Set();
        for (const item of items) {
          values.add(clean(item[key], fallback));
        }
        return Array.from(values).sort((a, b) => a.localeCompare(b));
      }

      function countBy(items, key, fallback) {
        const counts = {};
        for (const item of items) {
          const val = clean(item[key], fallback);
          counts[val] = (counts[val] || 0) + 1;
        }
        return counts;
      }

      function updateFilterOptions() {
        const types = uniqueValues(allOrgs, "org_type", "organisation");
        const boroughs = uniqueValues(allOrgs, "borough", "Unspecified");

        const boroughScoped = ui.borough === "all" ? allOrgs : allOrgs.filter((o) => clean(o.borough, "Unspecified") === ui.borough);
        const typeScoped = ui.org_type === "all" ? allOrgs : allOrgs.filter((o) => clean(o.org_type, "organisation") === ui.org_type);

        const typeCounts = countBy(boroughScoped, "org_type", "organisation");
        const borCounts = countBy(typeScoped, "borough", "Unspecified");

        els.org_type.innerHTML = `<option value="all">All types (${boroughScoped.length})</option>${types
          .map((item) => `<option value="${escapeHtml(item)}">${escapeHtml(orgTypeLabel(item))} (${typeCounts[item] || 0})</option>`)
          .join("")}`;
        els.org_type.value = ui.org_type;

        els.borough.innerHTML = `<option value="all">All boroughs (${typeScoped.length})</option>${boroughs
          .map((item) => `<option value="${escapeHtml(item)}">${escapeHtml(item)} (${borCounts[item] || 0})</option>`)
          .join("")}`;
        els.borough.value = ui.borough;
      }

      function filteredOrgs() {
        const list = allOrgs.filter((org) => {
          const orgType = clean(org.org_type, "organisation");
          const borough = clean(org.borough, "Unspecified");
          if (ui.org_type !== "all" && ui.org_type !== orgType) return false;
          if (ui.borough !== "all" && ui.borough !== borough) return false;
          return true;
        });

        list.sort((a, b) => clean(a.name).localeCompare(clean(b.name)));
        return list;
      }

      function render() {
        updateFilterOptions();
        const rows = filteredOrgs();
        if (!rows.length) {
          els.results.innerHTML = `<div class="empty">No organizations match the filters.</div>`;
          return;
        }

        const items = rows
          .map((org) => {
            const name = clean(org.name, "Unnamed");
            const eventsUrl = clean(org.events_url);
            const orgType = orgTypeLabel(org.org_type);
            const borough = clean(org.borough, "Unspecified");
            const nameMarkup = eventsUrl
              ? `<a href="${escapeHtml(eventsUrl)}" target="_blank" rel="noreferrer noopener">${escapeHtml(name)}</a>`
              : escapeHtml(name);
            return `
              <li>
                <p class="org-name">${nameMarkup}</p>
                <div class="org-meta">${escapeHtml(orgType)} • ${escapeHtml(borough)}</div>
              </li>
            `;
          })
          .join("");

        els.results.innerHTML = `<ul class="list">${items}</ul>`;
      }

      function wireEvents() {
        els.org_type.addEventListener("change", (event) => {
          ui.org_type = event.target.value || "all";
          render();
        });

        els.borough.addEventListener("change", (event) => {
          ui.borough = event.target.value || "all";
          render();
        });

        els.clear.addEventListener("click", () => {
          ui.org_type = "all";
          ui.borough = "all";
          els.org_type.value = "all";
          els.borough.value = "all";
          render();
        });
      }

      wireEvents();
      render();
    </script>
  </body>
</html>
