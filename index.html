<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>London Tasteful Events - Admin Pages</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Segoe UI", Arial, sans-serif;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(180deg, #f6f1e8, #efe6d8);
        color: #1f1b17;
      }
      main {
        width: min(720px, 92vw);
        background: #fffdf9;
        border: 1px solid #d8cbb6;
        border-radius: 16px;
        box-shadow: 0 12px 32px rgba(45, 31, 17, 0.12);
        padding: 24px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 1.8rem;
      }
      p {
        margin: 0 0 18px;
        color: #615648;
      }
      ul {
        list-style: none;
        margin: 0;
        padding: 0;
        display: grid;
        gap: 10px;
      }
      a {
        display: block;
        text-decoration: none;
        color: #123f5d;
        border: 1px solid #d5c6af;
        border-radius: 10px;
        padding: 12px 14px;
        background: #fff;
        font-weight: 600;
      }
      a:hover {
        background: #f9f3e8;
      }
      small {
        display: block;
        margin-top: 4px;
        color: #786a59;
        font-weight: 500;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>London Tasteful Events</h1>
      <p>Admin-facing pages deployed from this repository.</p>
      <ul>
        <li>
          <a href="./codex-curation-console.html">
            Codex Curation Console
            <small>Mobile-first 20-item org review queue</small>
          </a>
        </li>
        <li>
          <a href="./claude-review.html">
            Claude Review Console
            <small>Renamed from review.html for clear workstream separation</small>
          </a>
        </li>
      </ul>
    </main>
  </body>
</html>
