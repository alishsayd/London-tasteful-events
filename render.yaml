databases:
  - name: london-tasteful-events-db
    plan: starter
    databaseName: london_tasteful_events
    user: london_tasteful_events

services:
  - type: web
    name: london-tasteful-events-admin
    runtime: python
    plan: starter
    autoDeploy: true
    healthCheckPath: /api/stats
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn seed_orgs.wsgi:app --bind 0.0.0.0:$PORT --workers 2 --threads 4
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: london-tasteful-events-db
          property: connectionString
      - key: AUTO_SEED_ORGS
        value: "true"
