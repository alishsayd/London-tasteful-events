<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Org Seeder — London Tasteful Events</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #0a0a0a;
    color: #e0e0e0;
    line-height: 1.5;
}
a { color: #7eb8ff; text-decoration: none; }
a:hover { text-decoration: underline; }

/* Top bar */
.topbar {
    background: #151515;
    border-bottom: 1px solid #2a2a2a;
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
}
.topbar h1 { font-size: 15px; font-weight: 600; color: #fff; }
.stats { display: flex; gap: 16px; font-size: 13px; }
.stat { color: #888; cursor: pointer; padding: 4px 8px; border-radius: 4px; }
.stat:hover { background: #222; }
.stat.active { background: #2a2a2a; }
.stat strong { color: #e0e0e0; }
.stat.approved strong { color: #4ade80; }
.stat.rejected strong { color: #f87171; }
.stat.maybe strong { color: #fbbf24; }
.stat.pending strong { color: #7eb8ff; }

/* Mode tabs */
.tabs {
    background: #151515;
    border-bottom: 1px solid #2a2a2a;
    padding: 8px 24px;
    display: flex;
    gap: 8px;
    align-items: center;
}
.tab {
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 13px;
    color: #aaa;
    cursor: pointer;
    border: none;
    background: none;
    font-family: inherit;
}
.tab:hover { background: #222; color: #fff; }
.tab.active { background: #2a2a2a; color: #fff; }
.tab-right { margin-left: auto; }
.btn-export {
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 13px;
    color: #4ade80;
    background: #166534;
    border: none;
    cursor: pointer;
    font-family: inherit;
}
.btn-export:hover { background: #15803d; }
.btn-reset {
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 13px;
    color: #f87171;
    background: #7f1d1d;
    border: none;
    cursor: pointer;
    font-family: inherit;
}
.btn-reset:hover { background: #991b1b; }

/* Container */
.container { max-width: 1100px; margin: 0 auto; padding: 24px; }

/* Review card */
.review-card {
    max-width: 700px;
    margin: 32px auto;
    background: #151515;
    border: 1px solid #2a2a2a;
    border-radius: 12px;
    overflow: hidden;
}
.review-header {
    padding: 24px 28px 16px;
}
.review-header h2 { font-size: 22px; color: #fff; margin-bottom: 4px; }
.review-meta {
    font-size: 13px;
    color: #666;
    display: flex;
    gap: 16px;
    margin-top: 8px;
}
.review-meta span {
    background: #1e1e1e;
    padding: 2px 10px;
    border-radius: 4px;
}
.review-body { padding: 16px 28px; }
.review-body p { color: #bbb; font-size: 14px; margin-bottom: 12px; }
.review-links { display: flex; gap: 16px; margin-bottom: 16px; }
.review-links a {
    font-size: 13px;
    padding: 4px 12px;
    background: #1e1e1e;
    border-radius: 4px;
}
.review-links a:hover { background: #2a2a2a; text-decoration: none; }
.edit-row {
    display: grid;
    grid-template-columns: 100px 1fr;
    gap: 8px;
    align-items: center;
    margin-bottom: 8px;
}
.edit-row label {
    font-size: 12px;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 0.05em;
}
.edit-input {
    background: #0a0a0a;
    border: 1px solid #2a2a2a;
    border-radius: 4px;
    color: #e0e0e0;
    padding: 6px 10px;
    font-size: 13px;
    width: 100%;
    font-family: inherit;
}
.edit-input:focus { border-color: #444; outline: none; }
.notes-input {
    width: 100%;
    padding: 10px 14px;
    margin-top: 12px;
    background: #0a0a0a;
    border: 1px solid #2a2a2a;
    border-radius: 6px;
    color: #e0e0e0;
    font-size: 13px;
    font-family: inherit;
    resize: vertical;
}
.notes-input::placeholder { color: #444; }
.review-actions {
    padding: 20px 28px;
    border-top: 1px solid #1a1a1a;
    display: flex;
    gap: 10px;
    align-items: center;
}
.remaining {
    margin-left: auto;
    font-size: 13px;
    color: #666;
}
.btn {
    padding: 10px 24px;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
}
.btn-approve { background: #166534; color: #4ade80; }
.btn-approve:hover { background: #15803d; }
.btn-reject { background: #7f1d1d; color: #f87171; }
.btn-reject:hover { background: #991b1b; }
.btn-maybe { background: #713f12; color: #fbbf24; }
.btn-maybe:hover { background: #854d0e; }
.btn-skip { background: #1e1e1e; color: #888; }
.btn-skip:hover { background: #2a2a2a; color: #ccc; }

.shortcuts {
    text-align: center;
    margin-top: 20px;
    font-size: 12px;
    color: #444;
}
.kbd {
    display: inline-block;
    padding: 2px 6px;
    border: 1px solid #444;
    border-radius: 4px;
    font-size: 11px;
    font-family: monospace;
    color: #aaa;
    background: #1a1a1a;
    margin: 0 2px;
}

/* Table view */
.org-table { width: 100%; border-collapse: collapse; margin-top: 16px; }
.org-table th {
    text-align: left;
    padding: 8px 12px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #666;
    border-bottom: 1px solid #2a2a2a;
    cursor: pointer;
}
.org-table th:hover { color: #aaa; }
.org-table td {
    padding: 10px 12px;
    font-size: 14px;
    border-bottom: 1px solid #1a1a1a;
    vertical-align: top;
}
.org-table tr:hover { background: #151515; }
.tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 500;
}
.tag-approved { background: #166534; color: #4ade80; }
.tag-rejected { background: #7f1d1d; color: #f87171; }
.tag-maybe { background: #713f12; color: #fbbf24; }
.tag-pending { background: #1e3a5f; color: #7eb8ff; }
.actions-cell { display: flex; gap: 4px; }
.actions-cell .btn { padding: 4px 10px; font-size: 12px; }
.empty {
    text-align: center;
    padding: 60px;
    color: #666;
}
.done-card {
    text-align: center;
    padding: 60px;
    max-width: 500px;
    margin: 60px auto;
}
.done-card h2 { color: #4ade80; font-size: 24px; margin-bottom: 16px; }
.done-stats { font-size: 14px; color: #666; line-height: 2; }
.done-stats strong { color: #e0e0e0; }
</style>
</head>

// ============================================================
// STATE — persisted to localStorage
// ============================================================
const STORAGE_KEY = 'lte_org_reviews';

function loadState() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) return JSON.parse(saved);
    // Initialize from seed
    const state = {};
    SEED_DATA.forEach(org => {
        state[org.id] = {
            status: 'pending',
            notes: '',
            events_url: org.events_url || '',
            borough: org.borough || '',
            category: org.category || '',
        };
    });
    return state;
}

function saveState() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

let state = loadState();
let currentMode = 'review';
let currentFilter = 'pending';

// ============================================================
// STATS
// ============================================================
function getStats() {
    const stats = { pending: 0, approved: 0, rejected: 0, maybe: 0, total: SEED_DATA.length };
    SEED_DATA.forEach(org => {
        const s = state[org.id]?.status || 'pending';
        stats[s] = (stats[s] || 0) + 1;
    });
    return stats;
}

function renderStats() {
    const stats = getStats();
    document.getElementById('stats-bar').innerHTML = `
        <span class="stat pending ${currentMode === 'list' && currentFilter === 'pending' ? 'active' : ''}"
              onclick="showList('pending')">
            Pending: <strong>${stats.pending}</strong>
        </span>
        <span class="stat approved ${currentMode === 'list' && currentFilter === 'approved' ? 'active' : ''}"
              onclick="showList('approved')">
            Approved: <strong>${stats.approved}</strong>
        </span>
        <span class="stat maybe ${currentMode === 'list' && currentFilter === 'maybe' ? 'active' : ''}"
              onclick="showList('maybe')">
            Maybe: <strong>${stats.maybe}</strong>
        </span>
        <span class="stat rejected ${currentMode === 'list' && currentFilter === 'rejected' ? 'active' : ''}"
              onclick="showList('rejected')">
            Rejected: <strong>${stats.rejected}</strong>
        </span>
        <span class="stat">Total: <strong>${stats.total}</strong></span>
    `;
}

// ============================================================
// TAB HANDLING
// ============================================================
document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        const mode = tab.dataset.mode;
        if (mode === 'review') {
            currentMode = 'review';
            renderReview();
        } else {
            currentMode = 'list';
            currentFilter = tab.dataset.status;
            renderList(currentFilter);
        }
        renderStats();
    });
});

// ============================================================
// REVIEW MODE
// ============================================================
function getPendingOrgs() {
    return SEED_DATA.filter(org => (state[org.id]?.status || 'pending') === 'pending');
}

function renderReview() {
    const pending = getPendingOrgs();
    const main = document.getElementById('main');

    if (pending.length === 0) {
        const stats = getStats();
        main.innerHTML = `
            <div class="done-card">
                <h2>All caught up!</h2>
                <p style="color: #888; font-size: 16px; margin-bottom: 24px;">No more pending orgs to review.</p>
                <div class="done-stats">
                    <p>Approved: <strong style="color: #4ade80;">${stats.approved}</strong></p>
                    <p>Maybe: <strong style="color: #fbbf24;">${stats.maybe}</strong></p>
                    <p>Rejected: <strong style="color: #f87171;">${stats.rejected}</strong></p>
                </div>
                <div style="margin-top: 32px;">
                    <button class="btn-export" onclick="exportApproved()">Export Approved JSON</button>
                </div>
            </div>
        `;
        return;
    }

    const org = pending[0];
    const s = state[org.id];
    const remaining = pending.length - 1;

    main.innerHTML = `
        <div class="review-card">
            <div class="review-header">
                <h2>${esc(org.name)}</h2>
                <div class="review-meta">
                    ${s.borough ? `<span>${esc(s.borough)}</span>` : ''}
                    ${s.category ? `<span>${esc(s.category)}</span>` : ''}
                </div>
            </div>

            <div class="review-body">
                ${org.description ? `<p>${esc(org.description)}</p>` : ''}

                <div class="review-links">
                    ${org.homepage ? `<a href="${esc(org.homepage)}" target="_blank" rel="noopener">Homepage</a>` : ''}
                    ${s.events_url ? `<a href="${esc(s.events_url)}" target="_blank" rel="noopener">Events page</a>` : ''}
                </div>

                <div style="margin-top: 16px;">
                    <div class="edit-row">
                        <label>Events URL</label>
                        <input class="edit-input" id="edit-events-url" value="${esc(s.events_url)}" placeholder="https://...">
                    </div>
                    <div class="edit-row">
                        <label>Borough</label>
                        <input class="edit-input" id="edit-borough" value="${esc(s.borough)}" placeholder="e.g. Hackney">
                    </div>
                    <div class="edit-row">
                        <label>Category</label>
                        <input class="edit-input" id="edit-category" value="${esc(s.category)}" placeholder="e.g. gallery">
                    </div>
                </div>

                <textarea class="notes-input" id="edit-notes" rows="2" placeholder="Add notes (optional)...">${esc(s.notes)}</textarea>
            </div>

            <div class="review-actions">
                <button class="btn btn-approve" onclick="decide(${org.id}, 'approved')">Approve</button>
                <button class="btn btn-maybe" onclick="decide(${org.id}, 'maybe')">Maybe</button>
                <button class="btn btn-reject" onclick="decide(${org.id}, 'rejected')">Reject</button>
                <button class="btn btn-skip" onclick="renderReviewNext()">Skip</button>
                <span class="remaining">${remaining} remaining</span>
            </div>
        </div>

        <div class="shortcuts">
            <span class="kbd">A</span> Approve
            <span class="kbd">M</span> Maybe
            <span class="kbd">R</span> Reject
            <span class="kbd">S</span> Skip
            <span class="kbd">E</span> Focus events URL
        </div>
    `;
}

let skipIndex = 0;

function renderReviewNext() {
    // Skip just re-renders, cycling to next pending org
    const pending = getPendingOrgs();
    if (pending.length <= 1) {
        renderReview();
        return;
    }
    // Move current to end by temporarily marking and unmarking
    // Actually, simpler: just rotate the view
    skipIndex = (skipIndex + 1) % pending.length;
    const org = pending[skipIndex % pending.length];
    // Just re-render — the pending list order doesn't change so skip
    // doesn't really work with a simple filter. Let's just re-render.
    renderReview();
}

function decide(orgId, status) {
    // Save edits
    const eventsUrl = document.getElementById('edit-events-url')?.value || '';
    const borough = document.getElementById('edit-borough')?.value || '';
    const category = document.getElementById('edit-category')?.value || '';
    const notes = document.getElementById('edit-notes')?.value || '';

    state[orgId] = {
        ...state[orgId],
        status,
        events_url: eventsUrl,
        borough,
        category,
        notes,
    };
    saveState();
    renderStats();
    renderReview();
}

// ============================================================
// LIST MODE
// ============================================================
function renderList(filter) {
    const main = document.getElementById('main');
    let orgs = SEED_DATA;
    if (filter !== 'all') {
        orgs = orgs.filter(o => (state[o.id]?.status || 'pending') === filter);
    }

    if (orgs.length === 0) {
        main.innerHTML = `<div class="empty"><p>No orgs with status "${filter}".</p></div>`;
        return;
    }

    let rows = orgs.map(org => {
        const s = state[org.id] || {};
        const status = s.status || 'pending';
        return `
            <tr>
                <td>
                    <strong>${esc(org.name)}</strong>
                    ${org.description ? `<br><span style="color:#888;font-size:12px;">${esc(org.description.substring(0, 100))}</span>` : ''}
                </td>
                <td style="font-size:13px;color:#aaa;">${esc(s.borough || org.borough || '\u2014')}</td>
                <td style="font-size:13px;color:#aaa;">${esc(s.category || org.category || '\u2014')}</td>
                <td style="font-size:12px;">
                    ${org.homepage ? `<a href="${esc(org.homepage)}" target="_blank" rel="noopener">homepage</a>` : ''}
                    ${s.events_url ? `<br><a href="${esc(s.events_url)}" target="_blank" rel="noopener">events</a>` : ''}
                </td>
                <td><span class="tag tag-${status}">${status}</span></td>
                <td>
                    <div class="actions-cell">
                        <button class="btn btn-approve" onclick="quickStatus(${org.id},'approved')">Y</button>
                        <button class="btn btn-maybe" onclick="quickStatus(${org.id},'maybe')">?</button>
                        <button class="btn btn-reject" onclick="quickStatus(${org.id},'rejected')">N</button>
                    </div>
                </td>
            </tr>
        `;
    }).join('');

    main.innerHTML = `
        <table class="org-table">
            <thead><tr>
                <th>Name</th><th>Borough</th><th>Category</th><th>Links</th><th>Status</th><th>Actions</th>
            </tr></thead>
            <tbody>${rows}</tbody>
        </table>
    `;
}

function quickStatus(orgId, status) {
    state[orgId] = { ...state[orgId], status };
    saveState();
    renderStats();
    renderList(currentFilter);
}

// ============================================================
// EXPORT
// ============================================================
function exportApproved() {
    const approved = SEED_DATA
        .filter(org => state[org.id]?.status === 'approved')
        .map(org => {
            const s = state[org.id];
            return {
                name: org.name,
                homepage: org.homepage,
                events_url: s.events_url || org.events_url,
                description: org.description,
                borough: s.borough || org.borough,
                category: s.category || org.category,
                notes: s.notes || undefined,
            };
        });

    const blob = new Blob([JSON.stringify(approved, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'approved_orgs.json';
    a.click();
    URL.revokeObjectURL(url);
}

function resetAll() {
    if (!confirm('Reset all reviews? This cannot be undone.')) return;
    localStorage.removeItem(STORAGE_KEY);
    state = loadState();
    renderStats();
    if (currentMode === 'review') renderReview();
    else renderList(currentFilter);
}

// ============================================================
// KEYBOARD SHORTCUTS
// ============================================================
document.addEventListener('keydown', (e) => {
    if (currentMode !== 'review') return;
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

    const pending = getPendingOrgs();
    if (pending.length === 0) return;
    const orgId = pending[0].id;

    switch (e.key.toLowerCase()) {
        case 'a': decide(orgId, 'approved'); break;
        case 'r': decide(orgId, 'rejected'); break;
        case 'm': decide(orgId, 'maybe'); break;
        case 's': renderReviewNext(); break;
        case 'e':
            e.preventDefault();
            document.getElementById('edit-events-url')?.focus();
            break;
    }
});

// ============================================================
// UTILS
// ============================================================
function esc(str) {
    if (!str) return '';
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}

// ============================================================
// INIT
// ============================================================
function showList(status) {
    currentMode = 'list';
    currentFilter = status;
    document.querySelectorAll('.tab').forEach(t => {
        t.classList.remove('active');
        if (t.dataset.mode === 'list' && t.dataset.status === status) t.classList.add('active');
    });
    renderStats();
    renderList(status);
}

renderStats();
renderReview();
</script>
